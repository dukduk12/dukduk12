name: Update latest writing

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-writing
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate GitHub overview
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          THEME: nord_dark
          AUTO_PUSH: false

      - name: Fetch latest writing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/update_writing.py

      - name: Commit updated entries
        run: |
          if git diff --quiet README.md profile-summary-card-output/nord_dark/0-profile-details.svg; then
            echo "Profile content is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md profile-summary-card-output/nord_dark/0-profile-details.svg
          git commit -m "content: refresh latest writing"
          git push
