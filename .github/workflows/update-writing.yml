name: Update latest writing

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-writing
  cancel-in-progress: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Fetch latest writing
        run: python .github/scripts/update_writing.py

      - name: Commit updated entries
        run: |
          if git diff --quiet README.md; then
            echo "Writing list is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "content: refresh latest writing"
          git push
